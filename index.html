<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora PC Build - SQA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="contenedor">
        <h2>Simulador de Presupuesto PC</h2>

        <div class="form-group">
            <label>Procesador (CPU):</label>
            <select id="cpu">
                <option value="65" data-socket="LGA1151" data-precio="800" data-nombre="Intel Core i5-7400">Intel Core i5-7400 (65W - LGA1151) - 800 BOB</option>
                <option value="125" data-socket="LGA1700" data-precio="2800" data-nombre="Intel Core i7-13700K">Intel Core i7-13700K (125W - LGA1700) - 2800 BOB</option>
                <option value="65" data-socket="AM4" data-precio="1100" data-nombre="AMD Ryzen 5 5600X">AMD Ryzen 5 5600X (65W - AM4) - 1100 BOB</option>
                <option value="105" data-socket="am4" data-precio="1500" data-nombre="AMD Ryzen 7 5800X">AMD Ryzen 7 5800X (105W - AM4) - 1500 BOB</option>
                <option value="120" data-socket="AM5" data-precio="2200" data-nombre="AMD Ryzen 5 7600X">AMD Ryzen 5 7600X (120W - AM5) - 2200 BOB</option>
            </select>
        </div>

        <div class="form-group">
            <label>Placa Base (Motherboard):</label>
            <select id="mobo">
                <option data-socket="LGA1151" data-ram="DDR4" data-precio="600" data-nombre="Asus B150-PLUS">Asus B150-PLUS (LGA1151 - DDR4) - 600 BOB</option>
                <option data-socket="LGA1700" data-ram="DDR5" data-precio="1500" data-nombre="MSI PRO Z790-P">MSI PRO Z790-P (LGA1700 - DDR5) - 1500 BOB</option>
                <option data-socket="AM4" data-ram="DDR4" data-precio="800" data-nombre="Gigabyte B550M DS3H">Gigabyte B550M DS3H (AM4 - DDR4) - 800 BOB</option>
                <option data-socket="AM5" data-ram="DDR5" data-precio="1800" data-nombre="Asus ROG Strix B650E">Asus ROG Strix B650E (AM5 - DDR5) - 1800 BOB</option>
            </select>
        </div>

        <div class="form-group">
            <label>Memoria RAM:</label>
            <select id="ram">
                <option data-tipo="DDR4" data-precio="250" data-nombre="16GB RAM DDR4 3200MHz">16GB RAM DDR4 3200MHz - 250 BOB</option>
                <option data-tipo="DDR4" data-precio="450" data-nombre="32GB RAM DDR4 3600MHz">32GB RAM DDR4 3600MHz - 450 BOB</option>
                <option data-tipo="ddr5" data-precio="650" data-nombre="16GB RAM DDR5 5200MHz">16GB RAM DDR5 5200MHz - 650 BOB</option>
                <option data-tipo="DDR5" data-precio="1100" data-nombre="32GB RAM DDR5 6000MHz">32GB RAM DDR5 6000MHz - 1100 BOB</option>
            </select>
        </div>

        <div class="form-group">
            <label>Tarjeta Gráfica (GPU):</label>
            <select id="gpu">
                <option value="75" data-precio="1200" data-nombre="NVIDIA GTX 1650">NVIDIA GTX 1650 (75W) - 1200 BOB</option>
                <option value="170" data-precio="2500" data-nombre="NVIDIA RTX 3060 12GB">NVIDIA RTX 3060 12GB (170W) - 2500 BOB</option>
                <option value="230" data-precio="3200" data-nombre="AMD Radeon RX 6700 XT">AMD Radeon RX 6700 XT (230W) - 3200 BOB</option>
                <option value="320" data-precio="8500" data-nombre="NVIDIA RTX 4080 16GB">NVIDIA RTX 4080 16GB (320W) - 8500 BOB</option>
            </select>
        </div>

        <div class="form-group">
            <label>Fuente de Poder (PSU):</label>
            <select id="psu">
                <option value="200" data-precio="200" data-nombre="Genérica 200W">Genérica 200W - 200 BOB</option>
                <option value="500" data-precio="350" data-nombre="EVGA 500W 80 Plus">EVGA 500W 80 Plus - 350 BOB</option>
                <option value="750" data-precio="800" data-nombre="Corsair CX750M">Corsair CX750M 750W - 800 BOB</option>
                <option value="1000" data-precio="1400" data-nombre="Seasonic Focus 1000W">Seasonic Focus 1000W 80+ Gold - 1400 BOB</option>
            </select>
        </div>

        <button onclick="validarYCalcular()">Calcular y Validar Ensamblaje</button>

        <div id="resultado">Esperando acción...</div>
    </div>

    <script src="calculadora.js"></script>
</body>
</html>
